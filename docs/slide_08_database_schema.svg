<line x1="40" y1="76" x2="1160" y2="76" stroke="#1e293b" stroke-width="1"/><rect x="40" y="110" width="1120" height="80" rx="10" fill="#0a0e1a" stroke="#1e293b" stroke-width="1.5"/><text x="60" y="145" font-family="system-ui, sans-serif" font-size="16" fill="#eab308">Agent has no database -- all state is file-based.</text><text x="60" y="170" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Skills read from .claude/ and write to visualizations/ or stdout.</text><rect x="40" y="220" width="360" height="140" rx="10" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/><text x="55" y="245" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#3b82f6">SKILL.md (Frontmatter)</text><line x1="50" y1="255" x2="385" y2="255" stroke="#1e293b" stroke-width="1"/><text x="55" y="275" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">name: string (skill identifier)</text><text x="55" y="293" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">description: string (trigger patterns)</text><text x="55" y="311" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">argument-hint: string (usage hint)</text><text x="55" y="329" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">allowed-tools: list (tool whitelist)</text><rect x="420" y="220" width="360" height="100" rx="10" fill="#111827" stroke="#ef4444" stroke-width="1.5"/><text x="435" y="245" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#ef4444">settings.json</text><line x1="430" y1="255" x2="765" y2="255" stroke="#1e293b" stroke-width="1"/><text x="435" y="275" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">permissions.allow: string[] (Bash patterns)</text><text x="435" y="293" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">permissions.deny: string[] (Bash patterns)</text><rect x="40" y="400" width="360" height="140" rx="10" fill="#111827" stroke="#8b5cf6" stroke-width="1.5"/><text x="55" y="425" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#8b5cf6">DATA dict (generate_visuals.py)</text><line x1="50" y1="435" x2="385" y2="435" stroke="#1e293b" stroke-width="1"/><text x="55" y="455" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">1-11: dict (one per slide)</text><text x="55" y="473" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">title, subtitle, accent: string</text><text x="55" y="491" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">cards | boxes | layers | entities: list</text><text x="55" y="509" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">connections | relationships | steps: list</text><rect x="420" y="400" width="360" height="140" rx="10" fill="#111827" stroke="#eab308" stroke-width="1.5"/><text x="435" y="425" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#eab308">SCENARIOS array (interactive.html)</text><line x1="430" y1="435" x2="765" y2="435" stroke="#1e293b" stroke-width="1"/><text x="435" y="455" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">id: string, label: string, color: hex</text><text x="435" y="473" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">actors: [{id, label, sub, x, y, color}]</text><text x="435" y="491" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">steps: [{from, to, label, narration,</text><text x="435" y="509" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">         detail, state}]</text><text x="60" y="590" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">Generated Output Artifacts</text><text x="80" y="615" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b5cf6">slide_01..11.svg</text><text x="320" y="615" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">SVG infographics (11 altitude-descent slides)</text><text x="80" y="643" font-family="'JetBrains Mono', monospace" font-size="12" fill="#3b82f6">index.html</text><text x="320" y="643" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Slideshow viewer with thumbnail sidebar</text><text x="80" y="671" font-family="'JetBrains Mono', monospace" font-size="12" fill="#10b981">interactive.html</text><text x="320" y="671" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">GSAP-animated scenario walkthrough</text><text x="80" y="699" font-family="'JetBrains Mono', monospace" font-size="12" fill="#eab308">deep-dive.html</text><text x="320" y="699" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Styled analysis report (design decisions, invariants, failures)</text><text x="80" y="727" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">deep-dive.md</text><text x="320" y="727" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Markdown source for deep-dive analysis</text>
