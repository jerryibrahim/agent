<line x1="40" y1="76" x2="1160" y2="76" stroke="#1e293b" stroke-width="1"/><rect x="80" y="120" width="1040" height="80" rx="10" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/><text x="120" y="155" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#3b82f6">User Intent</text><text x="120" y="178" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Developer invokes skill via natural language or /command</text><rect x="80" y="230" width="1040" height="80" rx="10" fill="#111827" stroke="#10b981" stroke-width="1.5"/><text x="120" y="265" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#10b981">Skill Dispatcher</text><text x="120" y="288" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Claude Code matches intent to SKILL.md, parses $ARGUMENTS</text><rect x="80" y="340" width="1040" height="80" rx="10" fill="#111827" stroke="#eab308" stroke-width="1.5"/><text x="120" y="375" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#eab308">Reference Loader</text><text x="120" y="398" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Reads methodology docs from references/ (review.md, red-team.md, etc.)</text><rect x="80" y="450" width="1040" height="80" rx="10" fill="#111827" stroke="#8b5cf6" stroke-width="1.5"/><text x="120" y="485" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#8b5cf6">Exploration Phase</text><text x="120" y="508" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Subagents scan codebase: structure, types, routes, state machines</text><rect x="80" y="560" width="1040" height="80" rx="10" fill="#111827" stroke="#ec4899" stroke-width="1.5"/><text x="120" y="595" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ec4899">Generation Phase</text><text x="120" y="618" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Produces artifacts: SVG slides, HTML walkthroughs, analysis reports</text><rect x="80" y="670" width="1040" height="80" rx="10" fill="#111827" stroke="#ef4444" stroke-width="1.5"/><text x="120" y="705" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ef4444">Validation Phase</text><text x="120" y="728" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">xmllint SVGs, template conformance, content completeness checks</text><line x1="600" y1="200" x2="600" y2="230" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4"/><polygon points="595,225 600,230 605,225" fill="#334155"/><line x1="600" y1="310" x2="600" y2="340" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4"/><polygon points="595,335 600,340 605,335" fill="#334155"/><line x1="600" y1="420" x2="600" y2="450" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4"/><polygon points="595,445 600,450 605,445" fill="#334155"/><line x1="600" y1="530" x2="600" y2="560" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4"/><polygon points="595,555 600,560 605,555" fill="#334155"/><line x1="600" y1="640" x2="600" y2="670" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4"/><polygon points="595,665 600,670 605,665" fill="#334155"/><text x="1140" y="450.0" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="end" transform="rotate(-90, 1140, 450.0)">Execution Flow</text>
