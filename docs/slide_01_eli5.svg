<rect width="1200" height="900" fill="url(#bgGrad)"/>
<rect x="0" y="0" width="1200" height="80" fill="#0a0e1a" opacity="0.7"/>
<text x="40" y="38" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#3b82f6">ELI5 -- What is Agent?</text>
<text x="40" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">50,000 ft -- The Big Picture</text>
<line x1="40" y1="76" x2="1160" y2="76" stroke="#1e293b" stroke-width="1"/><rect x="40" y="100" width="1120" height="160" rx="10" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/><text x="70" y="135" font-family="system-ui, sans-serif" font-size="16" fill="#cbd5e1">Imagine a master craftsman's toolbox -- not the kind you build things with,</text>
<text x="70" y="161" font-family="system-ui, sans-serif" font-size="16" fill="#cbd5e1">but the kind that teaches OTHER craftsmen how to think, analyze, and document.</text>
<text x="70" y="187" font-family="system-ui, sans-serif" font-size="16" fill="#cbd5e1"></text>
<text x="70" y="213" font-family="system-ui, sans-serif" font-size="16" fill="#cbd5e1">Agent is a collection of reusable skills for Claude Code that provide structured</text>
<text x="70" y="239" font-family="system-ui, sans-serif" font-size="16" fill="#cbd5e1">methodologies: adversarial review, rapid learning, and visual documentation.</text><rect x="40" y="300" width="360" height="150" rx="10" fill="#111827" stroke="#ef4444" stroke-width="1.5"/><circle cx="75" cy="340" r="18" fill="#ef4444" opacity="0.2"/><circle cx="75" cy="340" r="8" fill="#ef4444"/><text x="105" y="335" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444">Debate</text><text x="105" y="355" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">The War Room</text><text x="70" y="390" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Three-mode adversarial analysis: review, red-team, steelman</text><text x="70" y="420" font-family="'JetBrains Mono', monospace" font-size="11" fill="#475569">.claude/skills/debate/</text><rect x="420" y="300" width="360" height="150" rx="10" fill="#111827" stroke="#10b981" stroke-width="1.5"/><circle cx="455" cy="340" r="18" fill="#10b981" opacity="0.2"/><circle cx="455" cy="340" r="8" fill="#10b981"/><text x="485" y="335" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#10b981">JIT Learning</text><text x="485" y="355" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">The Speed Reader</text><text x="450" y="390" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Five-step Bloom's Taxonomy framework for rapid tech grokking</text><text x="450" y="420" font-family="'JetBrains Mono', monospace" font-size="11" fill="#475569">.claude/skills/jit-learning/</text><rect x="800" y="300" width="360" height="150" rx="10" fill="#111827" stroke="#8b5cf6" stroke-width="1.5"/><circle cx="835" cy="340" r="18" fill="#8b5cf6" opacity="0.2"/><circle cx="835" cy="340" r="8" fill="#8b5cf6"/><text x="865" y="335" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#8b5cf6">Visualize</text><text x="865" y="355" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">The Cartographer</text><text x="830" y="390" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Generate SVG infographics + GSAP walkthroughs from any codebase</text><text x="830" y="420" font-family="'JetBrains Mono', monospace" font-size="11" fill="#475569">.claude/skills/visualize-codebase/</text><rect x="40" y="480" width="360" height="150" rx="10" fill="#111827" stroke="#eab308" stroke-width="1.5"/><circle cx="75" cy="520" r="18" fill="#eab308" opacity="0.2"/><circle cx="75" cy="520" r="8" fill="#eab308"/><text x="105" y="515" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#eab308">Propose</text><text x="105" y="535" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">The Advisor</text><text x="70" y="570" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Deep-analyze topics and propose 2-4 options with pros/cons/risk</text><text x="70" y="600" font-family="'JetBrains Mono', monospace" font-size="11" fill="#475569">.claude/skills/propose/</text><rect x="420" y="480" width="360" height="150" rx="10" fill="#111827" stroke="#06b6d4" stroke-width="1.5"/><circle cx="455" cy="520" r="18" fill="#06b6d4" opacity="0.2"/><circle cx="455" cy="520" r="8" fill="#06b6d4"/><text x="485" y="515" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#06b6d4">Commit</text><text x="485" y="535" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">The Scribe</text><text x="450" y="570" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Automate structured multiline git commits with smart staging</text><text x="450" y="600" font-family="'JetBrains Mono', monospace" font-size="11" fill="#475569">.claude/skills/commit/</text><rect x="800" y="480" width="360" height="150" rx="10" fill="#111827" stroke="#ec4899" stroke-width="1.5"/><circle cx="835" cy="520" r="18" fill="#ec4899" opacity="0.2"/><circle cx="835" cy="520" r="8" fill="#ec4899"/><text x="865" y="515" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ec4899">Gallery Index</text><text x="865" y="535" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">The Librarian</text><text x="830" y="570" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1">Build multi-project visualization galleries with shared nav</text><text x="830" y="600" font-family="'JetBrains Mono', monospace" font-size="11" fill="#475569">.claude/skills/visualize-index/</text><text x="600" y="840" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Not an application -- a methodology toolkit that extends Claude Code's capabilities.</text>
</svg>