<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0f172a"/>
    <stop offset="100%" stop-color="#0a0e1a"/>
  </linearGradient>
</defs>
<rect width="1200" height="900" fill="url(#bgGrad)"/>
<rect x="0" y="0" width="1200" height="80" fill="#0a0e1a" opacity="0.7"/>
<text x="40" y="38" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#94a3b8">Config &amp; Environment</text>
<text x="40" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Ground Level -- Operational Knobs</text>
<line x1="40" y1="76" x2="1160" y2="76" stroke="#1e293b" stroke-width="1"/><rect x="40" y="120" width="540" height="340" rx="10" fill="#0a0e1a" stroke="#10b981" stroke-width="1.5"/><text x="60" y="150" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#10b981">Bash Permission Allow List (settings.json)</text><text x="80" y="175" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(grep *) -- file content search</text><text x="80" y="197" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(find *) -- file discovery</text><text x="80" y="219" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(python3 */generate_visuals.py) -- SVG generation</text><text x="80" y="241" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(open */visualizations/*) -- open HTML in browser</text><text x="80" y="263" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(xmllint *) -- SVG XML validation</text><text x="80" y="285" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(go build/test/vet) -- Go toolchain</text><text x="80" y="307" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(make build/test/lint) -- Makefile targets</text><text x="80" y="329" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(git status/diff/log) -- read-only git</text><text x="80" y="351" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(kubectl *) -- Kubernetes read-only</text><text x="80" y="373" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(helm list/status/show) -- Helm read-only</text><rect x="620" y="120" width="540" height="200" rx="10" fill="#0a0e1a" stroke="#ef4444" stroke-width="1.5"/><text x="640" y="150" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444">Bash Permission Deny List (settings.json)</text><text x="660" y="175" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(git push *) -- no remote pushes</text><text x="660" y="197" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(git reset --hard *) -- no destructive resets</text><text x="660" y="219" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(rm -rf *) -- no recursive deletes</text><text x="660" y="241" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(helm install/upgrade/uninstall) -- no cluster changes</text><text x="660" y="263" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">Bash(make docker-reset) -- no container resets</text><rect x="620" y="340" width="540" height="120" rx="10" fill="#0a0e1a" stroke="#eab308" stroke-width="1.5"/><text x="640" y="370" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#eab308">Makefile Distribution Targets</text><text x="660" y="395" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">make copy-claude-all -- copy entire .claude/ to ~/.claude/</text><text x="660" y="417" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">make copy-claude-skill SKILL=&lt;name&gt; -- copy one skill</text><text x="660" y="439" font-family="'JetBrains Mono', monospace" font-size="11" fill="#cbd5e1">make copy-claude-skills -- copy all skills</text><text x="60" y="500" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#3b82f6">Key Conventions</text><rect x="40" y="530" width="1120" height="36" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1.5"/><text x="60" y="553" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#10b981">Zero Dependencies</text><text x="240" y="553" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Python SVG generation uses only stdlib; no pip install needed</text><rect x="40" y="572" width="1120" height="36" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1.5"/><text x="60" y="595" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3b82f6">Template Fidelity</text><text x="240" y="595" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Generated HTML must match canonical template skeleton exactly</text><rect x="40" y="614" width="1120" height="36" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1.5"/><text x="60" y="637" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#eab308">XML Escape</text><text x="240" y="637" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">All SVG text goes through xml.sax.saxutils.escape()</text><rect x="40" y="656" width="1120" height="36" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1.5"/><text x="60" y="679" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b5cf6">Skill Isolation</text><text x="240" y="679" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Each skill is self-contained; can be installed independently</text><rect x="40" y="698" width="1120" height="36" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1.5"/><text x="60" y="721" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">Permission Model</text><text x="240" y="721" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Deny-by-default; only explicit allows in settings.json execute</text>
</svg>