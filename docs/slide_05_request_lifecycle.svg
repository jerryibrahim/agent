<text x="40" y="38" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ef4444">Request Lifecycle</text>
<text x="40" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">10,000 ft -- Tracing a Codebase Visualization End-to-End</text>
<line x1="40" y1="76" x2="1160" y2="76" stroke="#1e293b" stroke-width="1"/><circle cx="80" cy="145" r="20" fill="#3b82f6" opacity="0.15"/><text x="80" y="150" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#3b82f6" text-anchor="middle">1</text><text x="120" y="142" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">User triggers /visualize-codebase</text><text x="120" y="164" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Developer invokes skill via natural language or slash command</text><line x1="80" y1="170" x2="80" y2="205" stroke="#334155" stroke-width="1.5"/><circle cx="80" cy="235" r="20" fill="#10b981" opacity="0.15"/><text x="80" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#10b981" text-anchor="middle">2</text><text x="120" y="232" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">SKILL.md loaded</text><text x="120" y="254" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Claude Code reads skill definition, parses arguments (all|static|interactive|deep-dive)</text><line x1="80" y1="260" x2="80" y2="295" stroke="#334155" stroke-width="1.5"/><circle cx="80" cy="325" r="20" fill="#eab308" opacity="0.15"/><text x="80" y="330" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#eab308" text-anchor="middle">3</text><text x="120" y="322" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">Phase 0: Explore</text><text x="120" y="344" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Subagents scan in parallel: README, entry points, types, routes, state machines, schema</text><line x1="80" y1="350" x2="80" y2="385" stroke="#334155" stroke-width="1.5"/><circle cx="80" cy="415" r="20" fill="#8b5cf6" opacity="0.15"/><text x="80" y="420" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#8b5cf6" text-anchor="middle">4</text><text x="120" y="412" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">Phase 1: Static SVGs</text><text x="120" y="434" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Python script generates 11 slides (50,000 ft to ground level), validated with xmllint</text><line x1="80" y1="440" x2="80" y2="475" stroke="#334155" stroke-width="1.5"/><circle cx="80" cy="505" r="20" fill="#ec4899" opacity="0.15"/><text x="80" y="510" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ec4899" text-anchor="middle">5</text><text x="120" y="502" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">Phase 2: Interactive HTML</text><text x="120" y="524" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">GSAP-animated walkthrough with scenario tabs, actor SVGs, state inspector</text><line x1="80" y1="530" x2="80" y2="565" stroke="#334155" stroke-width="1.5"/><circle cx="80" cy="595" r="20" fill="#06b6d4" opacity="0.15"/><text x="80" y="600" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#06b6d4" text-anchor="middle">6</text><text x="120" y="592" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">Phase 3: Deep-Dive</text><text x="120" y="614" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Markdown + HTML analysis of design decisions, invariants, failure modes</text><line x1="80" y1="620" x2="80" y2="655" stroke="#334155" stroke-width="1.5"/><circle cx="80" cy="685" r="20" fill="#ef4444" opacity="0.15"/><text x="80" y="690" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle">7</text><text x="120" y="682" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">Phase 4: Validate</text><text x="120" y="704" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Template conformance check, content completeness, open in browser</text><line x1="80" y1="710" x2="80" y2="745" stroke="#334155" stroke-width="1.5"/><circle cx="80" cy="775" r="20" fill="#94a3b8" opacity="0.15"/><text x="80" y="780" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">8</text><text x="120" y="772" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">Artifacts delivered</text><text x="120" y="794" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">visualizations/&lt;project&gt;/ contains index.html, interactive.html, deep-dive.html, 11 SVGs</text><text x="1100" y="480.0" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="end" transform="rotate(-90, 1100, 480.0)">Sequential phases -- each builds on the previous</text>
</svg>