<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT_NAME}} — Codebase Visualizations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

  /* Header */
  header { background: #0a0e1a; border-bottom: 1px solid #1e293b; padding: 40px 24px 32px; text-align: center; }
  header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
  header h1 span { color: #3b82f6; }
  header p { color: #94a3b8; font-size: 16px; max-width: 600px; margin: 0 auto; line-height: 1.5; }

  /* Grid — fixed 3 columns, equal row height */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 32px 24px; max-width: 1200px; margin: 0 auto; }
  @media (max-width: 960px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

  /* Card */
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); border-color: #3b82f6; }

  /* Clickable card area — wraps preview + body, links to Overview */
  .card-link { display: flex; flex-direction: column; flex: 1; text-decoration: none; color: inherit; cursor: pointer; }
  .card-link:hover { color: inherit; }

  .card-preview { height: 180px; background: #0f172a; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 12px; }
  .card-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }

  .card-body { padding: 20px 20px 12px; flex: 1; display: flex; flex-direction: column; }
  .card-body h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .card-body p { color: #94a3b8; font-size: 14px; line-height: 1.5; flex: 1; }
  .card-meta { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .tag { background: #0f172a; border: 1px solid #334155; padding: 3px 10px; border-radius: 999px; font-size: 11px; color: #94a3b8; white-space: nowrap; }
  .tag.lang-go { border-color: #0891b2; color: #22d3ee; }
  .tag.lang-ts { border-color: #2563eb; color: #60a5fa; }
  .tag.lang-py { border-color: #d97706; color: #fbbf24; }
  .tag.lang-rs { border-color: #f97316; color: #fb923c; }

  /* Links row — 3 equal buttons at card bottom */
  .card-links { display: flex; border-top: 1px solid #334155; }
  .card-links a { flex: 1; text-align: center; padding: 12px 8px; font-size: 13px; font-weight: 500; color: #94a3b8; text-decoration: none; transition: background 0.15s, color 0.15s; }
  .card-links a:not(:last-child) { border-right: 1px solid #334155; }
  .card-links a:hover { background: #334155; color: #e2e8f0; }
  .card-links a:first-child { border-radius: 0 0 0 12px; }
  .card-links a:last-child { border-radius: 0 0 12px 0; }

  /* Footer */
  footer { text-align: center; padding: 32px 24px; color: #475569; font-size: 13px; border-top: 1px solid #1e293b; margin-top: 16px; }
</style>
</head>
<body>

<header>
  <h1>{{PROJECT_NAME}}</h1>
  <p>{{PROJECT_DESCRIPTION}}</p>
</header>

<div class="grid">
{{CARDS}}
</div>

<footer>
  Generated with AI Skill <a href="https://github.com/Mirantis/ai-guide/tree/main/examples/claude-code/skills/research/visualize-codebase/" target="_blank" rel="noopener noreferrer"><strong>/visualize-codebase</strong></a>
</footer>

</body>
</html>
